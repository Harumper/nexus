# ===========================================
# Nexus - GitLab CI/CD Pipeline
# ===========================================

stages:
  - test
  - build
  - release
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  NODE_VERSION: "22"
  GO_VERSION: "1.23"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
  SECRET_DETECTION_ENABLED: "true"

# ===========================================
# Versioning (semver piloté par les tags git)
# ===========================================
# Calcule la version et la propage (dotenv) aux jobs de build.
#   - tag git vX.Y.Z         -> "X.Y.Z"
#   - N commits après un tag -> "X.Y.Z-N-g<sha>"  (build de dev)
#   - aucun tag dans l'arbre -> "0.0.0-dev+<sha>"
# Pour publier une version : git tag vX.Y.Z && git push origin vX.Y.Z
version:
  stage: .pre
  image: alpine:latest
  variables:
    GIT_DEPTH: 0 # clone complet : indispensable pour récupérer les tags
  before_script:
    - apk add --no-cache git
  script:
    # Version AGENT : DOIT changer uniquement quand le code de l'agent change
    # (sinon un commit backend/frontend signalerait une "MAJ dispo" sur tous les
    # agents alors que le binaire est identique). On combine :
    #   - le dernier tag joignable (vrai versioning de release), ou 0.0.0-dev ;
    #   - le sha du DERNIER commit touchant agent/ (build metadata +agent.<sha>).
    # Résultat : la version ne bouge que sur un nouveau tag OU un changement agent.
    # La comparaison "MAJ dispo" est une simple égalité de cette chaîne.
    - BASE="$(git describe --tags --abbrev=0 2>/dev/null || true)"
    - '[ -z "$BASE" ] && BASE="0.0.0-dev"'
    - BASE="${BASE#v}" # retire le 'v' de tête (v0.2.0 -> 0.2.0)
    - 'AGENT_REV="$(git rev-list -1 HEAD -- agent/ 2>/dev/null | cut -c1-7)"'
    - '[ -z "$AGENT_REV" ] && AGENT_REV="none"'
    - VERSION="${BASE}+agent.${AGENT_REV}"
    - echo "AGENT_VERSION=$VERSION" > version.env
    - cat version.env
  artifacts:
    reports:
      dotenv: version.env
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'

# ===========================================
# Test & Build checks
# ===========================================

# Backend : typecheck + build + tests (vitest)
# Les tests lisent des fichiers dans agent/ et frontend/, donc on a besoin du repo complet
test-backend:
  stage: test
  image: node:22-alpine
  before_script:
    - cd backend
    - npm ci
    - npx prisma generate
  script:
    - npx tsc --noEmit
    - npm run build
    - npm run test
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_TAG'

# Agent Go : vet + build statique
test-agent:
  stage: test
  image: golang:1.23-alpine
  before_script:
    - cd agent
  script:
    - go vet ./...
    # Les tests Go (validation/injections, parsing ss/lynis, watchdog…) sont la
    # partie la plus solide de la suite — ils DOIVENT tourner en CI.
    - go test ./...
    - CGO_ENABLED=0 go build -o /tmp/nexus-agent ./cmd/nexus-agent
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_TAG'

# Frontend : typecheck + build
test-frontend:
  stage: test
  image: node:22-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx tsc --noEmit
    - npm run build
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_TAG'

# ===========================================
# Build Docker Images
# ===========================================
build-backend:
  stage: build
  image: docker:24.0
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Mécanisme A : le binaire agent n'est plus dans l'image backend (servi depuis
    # le volume /release). Plus de --build-arg AGENT_VERSION.
    - docker build -f backend/Dockerfile -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/backend:latest .
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - test-backend

build-frontend:
  stage: build
  image: docker:24.0
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Debug : vérifier que les nouveaux composants sont bien présents dans le checkout
    - echo "=== Commit SHA ===" && echo "$CI_COMMIT_SHA"
    - echo "=== Files in frontend/src/components/ ===" && ls -la frontend/src/components/
    - echo "=== Expecting ServicesTab/FirewallTab/PackagesTab ==="
    - test -f frontend/src/components/ServicesTab.tsx || (echo "ServicesTab.tsx MISSING!" && exit 1)
    - test -f frontend/src/components/FirewallTab.tsx || (echo "FirewallTab.tsx MISSING!" && exit 1)
    - test -f frontend/src/components/PackagesTab.tsx || (echo "PackagesTab.tsx MISSING!" && exit 1)
    - docker build --no-cache --pull -f frontend/Dockerfile -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/frontend:latest ./frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - test-frontend

# L'agent est compilé statiquement en Go — on build l'image Docker
# mais en prod il est installé via scripts/install-agent.sh sur chaque machine
build-agent:
  stage: build
  image: docker:24.0
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --build-arg AGENT_VERSION="$AGENT_VERSION" -f agent/Dockerfile -t $CI_REGISTRY_IMAGE/agent:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/agent:latest ./agent
    - docker push $CI_REGISTRY_IMAGE/agent:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/agent:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - test-agent
    - version

# ===========================================
# Release agent — build + sha256 + VERSION (signature & publication = script local)
# ===========================================
# release-build (AUTO sur tag vX.Y.Z) : compile le binaire agent canonique, calcule
# son sha256, écrit VERSION (= AGENT_VERSION du job version). ARTEFACTS seulement.
# La SIGNATURE (clé minisign hors-ligne) et la PUBLICATION dans /release sont faites
# par scripts/release.sh sur la machine de confiance de l'opérateur — la clé privée
# ne touche JAMAIS la CI. Le script récupère ces artefacts via l'API GitLab.
release-build:
  stage: release
  image: golang:1.23-alpine
  needs:
    - version
    - test-agent
  script:
    - (cd agent && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "-w -s -X main.Version=$AGENT_VERSION" -o ../nexus-agent ./cmd/nexus-agent)
    - ./nexus-agent --version
    - sha256sum nexus-agent | tee nexus-agent.sha256
    - printf '%s\n' "$AGENT_VERSION" > VERSION
    - echo "Artefacts prets - binaire + sha256 + VERSION=$AGENT_VERSION - en local lance scripts/release.sh $CI_COMMIT_TAG"
  artifacts:
    paths:
      - nexus-agent
      - nexus-agent.sha256
      - VERSION
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG'

# ===========================================
# Deploy Production (serveur Nexus)
# ===========================================
deploy-prod:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: http://${PROD_SERVER_HOST}:26031
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - test -n "$PROD_SSH_PRIVATE_KEY" || (echo "PROD_SSH_PRIVATE_KEY not defined" && exit 1)
    - test -n "$PROD_SERVER_HOST" || (echo "PROD_SERVER_HOST not defined" && exit 1)
    - test -n "$PROD_SERVER_USER" || (echo "PROD_SERVER_USER not defined" && exit 1)
    - echo "$PROD_SSH_PRIVATE_KEY" > /tmp/ssh_key
    - chmod 600 /tmp/ssh_key
    - ssh-add /tmp/ssh_key || (ssh-keygen -p -m PEM -f /tmp/ssh_key -N "" && ssh-add /tmp/ssh_key)
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $PROD_SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - echo "Deploying Nexus to production..."
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "mkdir -p /docker_server/nexus"
    - scp docker-compose.yml $PROD_SERVER_USER@$PROD_SERVER_HOST:/docker_server/nexus/docker-compose.yml
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "test -f /docker_server/nexus/.env || echo 'WARNING - .env file not found'"
    # Pull images
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker pull $CI_REGISTRY_IMAGE/backend:latest"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker pull $CI_REGISTRY_IMAGE/frontend:latest"
    # Retag
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker tag $CI_REGISTRY_IMAGE/backend:latest nexus-backend:latest"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker tag $CI_REGISTRY_IMAGE/frontend:latest nexus-frontend:latest"
    # Deploy
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker network create nexus || true"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "cd /docker_server/nexus && docker compose down || true"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "cd /docker_server/nexus && docker compose up -d"
    - sleep 10
    # Utilise 'migrate deploy' (respecte les migrations SQL) au lieu de 'db push'
    # qui tente de normaliser les colonnes GENERATED et casse le tsvector
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker exec nexus-backend npx prisma migrate deploy || true"
    - echo "Nexus production deployment complete!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - build-backend
    - build-frontend
  when: manual

# ===========================================
# Deploy Agent (sur machines cibles)
# L'agent est installé manuellement via :
#   sudo ./scripts/install-agent.sh --server-url ... --machine-id ... --enrollment-token ...
#
# Le binaire peut être extrait de l'image Docker :
#   docker cp $(docker create $CI_REGISTRY_IMAGE/agent:latest):/usr/local/bin/nexus-agent ./nexus-agent
#
# Ou compilé localement :
#   cd agent && CGO_ENABLED=0 go build -o nexus-agent ./cmd/nexus-agent
# ===========================================

# ===========================================
# Notifications
# ===========================================
notify-success:
  stage: .post
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - test -n "$SLACK_WEBHOOK_URL" && curl -X POST -H "Content-type:application/json" --data "{\"text\":\"Nexus deployed successfully on $CI_COMMIT_BRANCH\"}" $SLACK_WEBHOOK_URL || echo "Notifications not configured"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  when: on_success

notify-failure:
  stage: .post
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - test -n "$SLACK_WEBHOOK_URL" && curl -X POST -H "Content-type:application/json" --data "{\"text\":\"Pipeline failed for Nexus on $CI_COMMIT_BRANCH\"}" $SLACK_WEBHOOK_URL || echo "Notifications not configured"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  when: on_failure
