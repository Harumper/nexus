# ===========================================
# Nexus - GitLab CI/CD Pipeline
# ===========================================

stages:
  - test
  - build
  - release
  - deploy

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  NODE_VERSION: "22"
  GO_VERSION: "1.23"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_UPDATE_NOTIFIER: "false"
  SECRET_DETECTION_ENABLED: "true"

# ===========================================
# Versioning (semver driven by git tags)
# ===========================================
# Computes the version and propagates it (dotenv) to the build jobs.
#   - git tag vX.Y.Z         -> "X.Y.Z"
#   - N commits after a tag  -> "X.Y.Z-N-g<sha>"  (dev build)
#   - no tag in the tree     -> "0.0.0-dev+<sha>"
# To publish a version: git tag vX.Y.Z && git push origin vX.Y.Z
version:
  stage: .pre
  image: alpine:latest
  variables:
    GIT_DEPTH: 0 # full clone: required to retrieve the tags
  before_script:
    - apk add --no-cache git
  script:
    # AGENT version: MUST change only when the agent code changes
    # (otherwise a backend/frontend commit would signal an "update available" on all
    # agents even though the binary is identical). We combine:
    #   - the latest reachable tag (real release versioning), or 0.0.0-dev;
    #   - the sha of the LATEST commit touching agent/ (build metadata +agent.<sha>).
    # Result: the version only moves on a new tag OR an agent change.
    # The "update available" comparison is a simple equality of this string.
    - BASE="$(git describe --tags --abbrev=0 2>/dev/null || true)"
    - '[ -z "$BASE" ] && BASE="0.0.0-dev"'
    - BASE="${BASE#v}" # strips the leading 'v' (v0.2.0 -> 0.2.0)
    - 'AGENT_REV="$(git rev-list -1 HEAD -- agent/ 2>/dev/null | cut -c1-7)"'
    - '[ -z "$AGENT_REV" ] && AGENT_REV="none"'
    - VERSION="${BASE}+agent.${AGENT_REV}"
    - echo "AGENT_VERSION=$VERSION" > version.env
    - cat version.env
  artifacts:
    reports:
      dotenv: version.env
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_TAG'

# ===========================================
# Test & Build checks
# ===========================================

# Backend: typecheck + build + tests (vitest)
# The tests read files in agent/ and frontend/, so we need the full repo
test-backend:
  stage: test
  image: node:22-alpine
  before_script:
    - cd backend
    - npm ci
    - npx prisma generate
  script:
    - npx tsc --noEmit
    - npm run build
    - npm run test
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_TAG'

# Go agent: vet + static build
test-agent:
  stage: test
  image: golang:1.23-alpine@sha256:383395b794dffa5b53012a212365d40c8e37109a626ca30d6151c8348d380b5f
  before_script:
    - cd agent
  script:
    - go vet ./...
    # The Go tests (validation/injections, ss/lynis parsing, watchdog…) are the
    # most solid part of the suite — they MUST run in CI.
    - go test ./...
    - CGO_ENABLED=0 go build -o /tmp/nexus-agent ./cmd/nexus-agent
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_TAG'

# Frontend: typecheck + build
test-frontend:
  stage: test
  image: node:22-alpine
  before_script:
    - cd frontend
    - npm ci
  script:
    - npx tsc --noEmit
    - npm run build
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_MERGE_REQUEST_ID'
    - if: '$CI_COMMIT_TAG'

# ===========================================
# Build Docker Images
# ===========================================
build-backend:
  stage: build
  image: docker:24.0
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Mechanism A: the agent binary is no longer in the backend image (served from
    # the /release volume). No more --build-arg AGENT_VERSION.
    - docker build -f backend/Dockerfile -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/backend:latest .
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - test-backend

build-frontend:
  stage: build
  image: docker:24.0
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Debug: verify that the new components are present in the checkout
    - echo "=== Commit SHA ===" && echo "$CI_COMMIT_SHA"
    - echo "=== Files in frontend/src/components/ ===" && ls -la frontend/src/components/
    - echo "=== Expecting ServicesTab/FirewallTab/PackagesTab ==="
    - test -f frontend/src/components/ServicesTab.tsx || (echo "ServicesTab.tsx MISSING!" && exit 1)
    - test -f frontend/src/components/FirewallTab.tsx || (echo "FirewallTab.tsx MISSING!" && exit 1)
    - test -f frontend/src/components/PackagesTab.tsx || (echo "PackagesTab.tsx MISSING!" && exit 1)
    - docker build --no-cache --pull -f frontend/Dockerfile -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/frontend:latest ./frontend
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - test-frontend

# The agent is statically compiled in Go — we build the Docker image
# but in prod it is installed via scripts/install-agent.sh on each machine
build-agent:
  stage: build
  image: docker:24.0
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --build-arg AGENT_VERSION="$AGENT_VERSION" -f agent/Dockerfile -t $CI_REGISTRY_IMAGE/agent:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/agent:latest ./agent
    - docker push $CI_REGISTRY_IMAGE/agent:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/agent:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - test-agent
    - version

# ===========================================
# Release agent — build + sha256 + VERSION (signing & publishing = local script)
# ===========================================
# release-build (AUTO on tag vX.Y.Z, ANCHORED to tag): compiles the canonical
# agent binary, computes its sha256, writes VERSION (= AGENT_VERSION from the `version`
# job, derived from the tag + the agent sha). ARTIFACTS only. The SIGNATURE (offline
# minisign key) and the PUBLICATION into /release are done by scripts/nexus-release.sh
# on the signing machine (project-scoped write_api token) — the private key NEVER
# touches the CI.
# Flow: ./nexus-release.sh creates the tag via the API, waits for this build's
# artifact, shows the sha256 for approval, signs offline, and publishes to /release.
release-build:
  stage: release
  image: golang:1.23-alpine@sha256:383395b794dffa5b53012a212365d40c8e37109a626ca30d6151c8348d380b5f
  needs:
    - version
    - test-agent
  script:
    # Reproducible build: -trimpath drops runner-absolute paths; the Go image is
    # pinned by digest above. Together they let anyone rebuild the exact same
    # bytes (same sha256) from source — the basis for third-party verification.
    - (cd agent && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags "-w -s -X main.Version=$AGENT_VERSION" -o ../nexus-agent ./cmd/nexus-agent)
    - ./nexus-agent --version
    - sha256sum nexus-agent | tee nexus-agent.sha256
    - printf '%s\n' "$AGENT_VERSION" > VERSION
    - echo "Artifacts ready - binary + sha256 + VERSION=$AGENT_VERSION - locally run scripts/nexus-release.sh approve $CI_COMMIT_TAG"
  artifacts:
    paths:
      - nexus-agent
      - nexus-agent.sha256
      - VERSION
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG'

# ===========================================
# Deploy Production (Nexus server)
# ===========================================
deploy-prod:
  stage: deploy
  image: alpine:latest
  environment:
    name: production
    url: http://${PROD_SERVER_HOST}:26031
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - test -n "$PROD_SSH_PRIVATE_KEY" || (echo "PROD_SSH_PRIVATE_KEY not defined" && exit 1)
    - test -n "$PROD_SERVER_HOST" || (echo "PROD_SERVER_HOST not defined" && exit 1)
    - test -n "$PROD_SERVER_USER" || (echo "PROD_SERVER_USER not defined" && exit 1)
    - echo "$PROD_SSH_PRIVATE_KEY" > /tmp/ssh_key
    - chmod 600 /tmp/ssh_key
    - ssh-add /tmp/ssh_key || (ssh-keygen -p -m PEM -f /tmp/ssh_key -N "" && ssh-add /tmp/ssh_key)
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $PROD_SERVER_HOST >> ~/.ssh/known_hosts
  script:
    - echo "Deploying Nexus to production..."
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "mkdir -p /docker_server/nexus"
    - scp docker-compose.yml $PROD_SERVER_USER@$PROD_SERVER_HOST:/docker_server/nexus/docker-compose.yml
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "test -f /docker_server/nexus/.env || echo 'WARNING - .env file not found'"
    # Pull images
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "echo $CI_REGISTRY_PASSWORD | docker login -u $CI_REGISTRY_USER --password-stdin $CI_REGISTRY"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker pull $CI_REGISTRY_IMAGE/backend:latest"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker pull $CI_REGISTRY_IMAGE/frontend:latest"
    # Retag
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker tag $CI_REGISTRY_IMAGE/backend:latest nexus-backend:latest"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker tag $CI_REGISTRY_IMAGE/frontend:latest nexus-frontend:latest"
    # Deploy
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker network create nexus || true"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "cd /docker_server/nexus && docker compose down || true"
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "cd /docker_server/nexus && docker compose up -d"
    - sleep 10
    # Uses 'migrate deploy' (respects the SQL migrations) instead of 'db push'
    # which tries to normalize the GENERATED columns and breaks the tsvector
    - ssh $PROD_SERVER_USER@$PROD_SERVER_HOST "docker exec nexus-backend npx prisma migrate deploy || true"
    - echo "Nexus production deployment complete!"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_COMMIT_TAG'
  needs:
    - build-backend
    - build-frontend
  when: manual

# ===========================================
# Deploy Agent (on target machines)
# The agent is installed manually via:
#   sudo ./scripts/install-agent.sh --server-url ... --machine-id ... --enrollment-token ...
#
# The binary can be extracted from the Docker image:
#   docker cp $(docker create $CI_REGISTRY_IMAGE/agent:latest):/usr/local/bin/nexus-agent ./nexus-agent
#
# Or compiled locally:
#   cd agent && CGO_ENABLED=0 go build -o nexus-agent ./cmd/nexus-agent
# ===========================================

# ===========================================
# Notifications
# ===========================================
notify-success:
  stage: .post
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - test -n "$SLACK_WEBHOOK_URL" && curl -X POST -H "Content-type:application/json" --data "{\"text\":\"Nexus deployed successfully on $CI_COMMIT_BRANCH\"}" $SLACK_WEBHOOK_URL || echo "Notifications not configured"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  when: on_success

notify-failure:
  stage: .post
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - test -n "$SLACK_WEBHOOK_URL" && curl -X POST -H "Content-type:application/json" --data "{\"text\":\"Pipeline failed for Nexus on $CI_COMMIT_BRANCH\"}" $SLACK_WEBHOOK_URL || echo "Notifications not configured"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  when: on_failure

# Warns when the agent source changed since the last published (signed) release,
# i.e. deployed agents cannot be upgraded to it until a new release is tagged.
# This is the guard-rail for the "merged agent code but forgot to publish" trap:
# the served binary only moves on a signed release, so drift here = stale fleet.
notify-agent-drift:
  stage: .post
  image: alpine:latest
  variables:
    GIT_DEPTH: 0 # full clone: required to reach tags + agent/ history
  before_script:
    - apk add --no-cache git curl
  script:
    - |
      LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"
      if [ -z "$LAST_TAG" ]; then echo "No release tag yet — nothing to compare, skipping."; exit 0; fi
      COUNT="$(git rev-list --count "$LAST_TAG"..HEAD -- agent/ 2>/dev/null || echo 0)"
      if [ "$COUNT" -eq 0 ]; then echo "Agent is in sync with release ${LAST_TAG}."; exit 0; fi
      MSG="Nexus: agent code changed since release ${LAST_TAG} (${COUNT} commit(s) under agent/). Publish a signed release (scripts/nexus-release.sh + git tag vX.Y.Z) or deployed agents stay outdated."
      echo "$MSG"
      test -n "$SLACK_WEBHOOK_URL" && curl -sf -X POST -H "Content-type:application/json" --data "{\"text\":\"${MSG}\"}" "$SLACK_WEBHOOK_URL" || echo "Notifications not configured"
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  when: on_success
