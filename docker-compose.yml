services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-db
    restart: unless-stopped
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
    ports:
      - "${POSTGRES_PORT:-26030}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus}"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    environment:
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-nexus}:${POSTGRES_PASSWORD:-nexus_dev}@postgres:5432/${POSTGRES_DB:-nexus}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      ECDSA_MASTER_SECRET: ${ECDSA_MASTER_SECRET:?Set ECDSA_MASTER_SECRET in .env}
      ENROLLMENT_TOKEN_EXPIRY_HOURS: ${ENROLLMENT_TOKEN_EXPIRY_HOURS:-24}
      HEARTBEAT_TIMEOUT_SECONDS: ${HEARTBEAT_TIMEOUT_SECONDS:-90}
      AUTH_MODE: ${AUTH_MODE:-local}
      KEYCLOAK_URL: ${KEYCLOAK_URL:-}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_ROLE_ADMIN: ${KEYCLOAK_ROLE_ADMIN:-nexus-admin}
      KEYCLOAK_ROLE_OPERATOR: ${KEYCLOAK_ROLE_OPERATOR:-nexus-operator}
      KEYCLOAK_ROLE_READONLY: ${KEYCLOAK_ROLE_READONLY:-nexus-readonly}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:26032}
      AGENT_BACKEND_URL: ${AGENT_BACKEND_URL:-http://localhost:26031}
      # Security / deployment (see .env.example) — MUST be declared here,
      # otherwise the .env only does interpolation and the variable never reaches
      # the container (footgun: feature coded + documented but silently dead).
      METRICS_TOKEN: ${METRICS_TOKEN:-}                              # WEB-AUTHZ-005: bearer /metrics (empty = network-scoping only)
      TRUSTED_PROXY_HOPS: ${TRUSTED_PROXY_HOPS:-1}                   # CP-006: number of proxies in front of the backend
      ALLOW_REMOTE_SCRIPT: ${ALLOW_REMOTE_SCRIPT:-false}            # AGENT-005: opt-in script.execute (default OFF)
      ALLOW_USER_PRIVILEGE_MGMT: ${ALLOW_USER_PRIVILEGE_MGMT:-false} # privileged-actions: sshkey/sudo (default OFF)
      NODE_ENV: production
      # Auto-upgrade (mechanism A) — binary, minisign signature and version served
      # from the /release volume (populated by the SIGNED release). The binary is
      # no longer in the image: as long as the volume is empty, /api/agents/download
      # returns 500 (neither install nor upgrade) — fail-closed by design. See README.
      NEXUS_AGENT_BINARY_PATH: /release/nexus-agent
      NEXUS_AGENT_SIGNATURE_PATH: /release/nexus-agent.minisig
      NEXUS_AGENT_VERSION_PATH: /release/VERSION
      # Design A: release PUBLIC key (minisign). If defined, the backend
      # embeds it in the bootstrap command → /etc/nexus/release.pub placed
      # automatically at install AND at reenroll (closes the footgun "reenroll
      # loses release.pub"). Public key = no risk. Same value as the CI var.
      NEXUS_RELEASE_PUBKEY: ${NEXUS_RELEASE_PUBKEY:-}
    ports:
      - "${BACKEND_PORT:-26031}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus
    volumes:
      # Release folder (binary+.minisig+VERSION) written by the CI via the
      # confined nexus-release user (write-only). Mounted read-only for the backend.
      - ./release:/release:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexus-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-26032}:80"
      - "${FRONTEND_TLS_PORT:-26033}:443"
    environment:
      TLS_ENABLED: ${TLS_ENABLED:-true}
      # CSP: allowed external SSO/OIDC origin (connect-src + frame-src), substituted
      # by envsubst in the nginx config at startup. Empty = self only. See .env.example.
      CSP_AUTH_ORIGIN: ${CSP_AUTH_ORIGIN:-}
    volumes:
      - ${TLS_CERT_DIR:-./certs}:/etc/nginx/certs
    depends_on:
      - backend
    networks:
      - nexus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  nexus:
    driver: bridge
